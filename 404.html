<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://kit.fontawesome.com https://gc.zgo.at;
                   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
                   font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
                   img-src 'self' data: https://odinguard.goatcounter.com;
                   connect-src 'self' https://cdn.tailwindcss.com https://odinguard.goatcounter.com;
                   frame-src https://odinguard.goatcounter.com;
                   frame-ancestors 'none';
                   base-uri 'self';
                   form-action 'self'">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina niet gevonden — OdinGuard</title>
    <meta name="robots" content="noindex">
    <script src="https://cdn.tailwindcss.com"></script>
    <script data-goatcounter="https://odinguard.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        sg: {
                            bg: '#050a14',
                            cyan: '#00d2ff',
                            text: '#94a3b8',
                            border: '#1a2744'
                        }
                    }
                }
            }
        };
    </script>
    <style>
        body {
            background-color: #050a14;
            color: #fff;
        }
        .grid-bg {
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 64px 64px;
        }
        .hero-glow {
            background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(0, 210, 255, 0.08) 0%, transparent 70%);
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d2ff 0%, #0099ff 100%);
            box-shadow: 0 0 24px rgba(0, 210, 255, 0.35);
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 0 32px rgba(0, 210, 255, 0.5);
            transform: translateY(-1px);
        }
        .card-glow {
            border: 1px solid rgba(26, 39, 68, 0.8);
            background: linear-gradient(145deg, rgba(12, 20, 37, 0.9) 0%, rgba(8, 14, 26, 0.95) 100%);
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen grid-bg hero-glow flex flex-col">
    <nav class="border-b border-sg-border/40 bg-[#050a14]/80 backdrop-blur-xl">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center">
            <a href="/" class="flex items-center gap-2.5 shrink-0">
                <svg class="w-7 h-7 text-sg-cyan" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                    <path d="M12 2L4 6v6c0 5.5 3.4 10.7 8 12 4.6-1.3 8-6.5 8-12V6l-8-4z"/>
                    <circle cx="12" cy="11" r="3" fill="currentColor" stroke="none" opacity="0.6"/>
                </svg>
                <span class="font-bold text-lg tracking-tight">OdinGuard</span>
            </a>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-4 py-16">
        <div class="card-glow rounded-2xl p-8 sm:p-12 max-w-lg w-full text-center">
            <p class="text-6xl sm:text-7xl font-extrabold text-sg-cyan/20 select-none" aria-hidden="true">404</p>
            <h1 class="text-2xl sm:text-3xl font-bold mt-2 mb-3">Pagina niet gevonden</h1>
            <p class="text-sg-text text-sm sm:text-base leading-relaxed mb-8">
                De pagina die je zoekt bestaat niet of is verplaatst. Ga terug naar de homepage voor meer informatie over OdinGuard.
            </p>
            <a href="/" class="btn-primary inline-flex items-center gap-2 text-[#050a14] font-semibold text-sm px-6 py-3 rounded-full">
                Naar de homepage
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5l7 7-7 7"/></svg>
            </a>
        </div>
    </main>

    <footer class="border-t border-sg-border/40 py-6 text-center text-sm">
        <p class="text-sg-text">&copy; OdinGuard</p>
        <div id="gc-counter" class="text-xs text-sg-muted mt-2">
            Bezoekers: <span id="counter-value">laden…</span>
            <noscript>Bezoekers: <a href="https://odinguard.goatcounter.com/" class="text-sg-cyan hover:underline">odinguard.goatcounter.com</a></noscript>
        </div>
    </footer>
    <script>
        (function () {
            var valueEl = document.getElementById('counter-value');
            if (!valueEl) return;

            var attempts = 0;
            var timer = setInterval(function () {
                attempts++;
                if (window.goatcounter && window.goatcounter.visit_count) {
                    clearInterval(timer);
                    var widgetHost = document.createElement('span');
                    widgetHost.id = 'gc-counter-widget';
                    valueEl.replaceWith(widgetHost);
                    window.goatcounter.visit_count({
                        append: '#gc-counter-widget',
                        path: 'TOTAL',
                        no_branding: true,
                        style: 'div { border: none !important; background: transparent !important; box-shadow: none !important; color: #94a3b8 !important; padding: 0 !important; margin: 0 !important; width: auto !important; height: auto !important; min-height: 0 !important; font-size: 0.75rem !important; line-height: 1.25rem !important; } #gcvc-for { display: none !important; } #gcvc-views { font-weight: 600 !important; color: #94a3b8 !important; } #gcvc-by { display: none !important; }'
                    });
                    return;
                }
                if (attempts > 100) {
                    clearInterval(timer);
                    valueEl.textContent = '—';
                }
            }, 100);
        })();
    </script>
</body>
</html>
